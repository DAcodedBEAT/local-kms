version: "2"

run:
  timeout: 5m

linters:
  default: none
  enable:
    - errcheck
    - govet
    - ineffassign
    - unused
    - misspell
    - staticcheck
    - gosec

  exclusions:
    rules:
      # crypto/x509 + ecc_key.go use Go 1.21-1.26 deprecated APIs (elliptic.Marshal,
      # rsa.PrivateKey.Precomputed.CRTValues, ecdsa.PrivateKey.D). Migration to
      # crypto/ecdh is tracked in docs/next-steps/clean-up-lint-findings.md.
      - path: src/x509/.*\.go
        linters:
          - staticcheck
        text: "SA1019"
      - path: src/cmk/ecc_key\.go
        linters:
          - staticcheck
        text: "SA1019"

  settings:
    gosec:
      excludes:
        # G104: errcheck already covers unhandled errors.
        - G104

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
