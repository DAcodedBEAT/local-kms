services:
  kms:
    container_name: local-kms-test
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ./init:/init
    ports:
      - "8080"
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--tries=1", "--spider", "http://localhost:8080/_health"]

      interval: 2s
      timeout: 5s
      retries: 10

  test:
    build:
      context: tests/functional
      dockerfile: Dockerfile
    depends_on:
      kms:
        condition: service_healthy
    environment:
      - KMS_URL=http://kms:8080
      - AWS_ACCESS_KEY_ID=test
      - AWS_SECRET_ACCESS_KEY=test
    volumes:
      - ./tests/functional:/app
    command: pytest -v --tb=short
