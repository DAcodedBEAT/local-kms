name: ci

on:
  push:
    branches: [master]
    tags: ['[0-9]+.[0-9]+.[0-9]+']
  pull_request:
    branches: [master]

env:
  REGISTRY: ghcr.io
  # IMAGE_NAME resolved per-job (lowercased) — GHCR rejects uppercase paths

jobs:
  binaries:
    name: build-${{ matrix.target.name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        target:
          - { name: darwin-amd64,        goos: darwin, goarch: amd64 }
          - { name: darwin-arm64,        goos: darwin, goarch: arm64 }
          - { name: linux-amd64,         goos: linux,  goarch: amd64 }
          - { name: linux-arm64,         goos: linux,  goarch: arm64 }
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Build
        env:
          GOOS: ${{ matrix.target.goos }}
          GOARCH: ${{ matrix.target.goarch }}
          CGO_ENABLED: "0"
          VERSION: ${{ github.ref_type == 'tag' && github.ref_name || format('dev-{0}', github.sha) }}
          COMMIT: ${{ github.sha }}
        run: |
          mkdir -p artifacts
          go build -trimpath \
            -ldflags "-s -w -X 'main.Version=${VERSION}' -X 'main.GitCommit=${COMMIT}'" \
            -o artifacts/local-kms_${{ matrix.target.name }}.bin ./cmd/local-kms
          go build -trimpath \
            -ldflags "-s -w -X 'main.Version=${VERSION}' -X 'main.GitCommit=${COMMIT}'" \
            -o artifacts/recovery_${{ matrix.target.name }}.bin ./cmd/recovery
          chmod +x artifacts/*.bin

      - uses: actions/upload-artifact@v4
        with:
          name: bin-${{ matrix.target.name }}
          path: artifacts/*_${{ matrix.target.name }}.bin
          retention-days: 7

  docker:
    name: docker-build-test-push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    outputs:
      image_ref: ${{ steps.meta.outputs.tags }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve image name (lowercase)
        id: img
        run: echo "name=${REGISTRY}/${GITHUB_REPOSITORY,,}" >> "$GITHUB_OUTPUT"

      - uses: docker/setup-qemu-action@v3
      - uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.img.outputs.name }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}
            type=raw,value=latest,enable=${{ github.ref == format('refs/heads/{0}', 'master') }}
            type=sha

      - name: Resolve build args
        id: bargs
        run: |
          if [ "${GITHUB_REF_TYPE}" = "tag" ]; then
            echo "version=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          else
            echo "version=dev-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      # Load single-arch amd64 build into local docker for functional tests
      - name: Build amd64 (load for tests)
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          load: true
          tags: local-kms:test
          build-args: |
            VERSION=${{ steps.bargs.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Functional tests
        run: |
          docker tag local-kms:test localkms-built:latest
          # Use compose file but override build with already-built image
          docker build -t local-kms-tests tests/functional
          docker network create kmsnet
          docker run -d --name local-kms --network kmsnet local-kms:test
          # Wait for health
          for i in $(seq 1 30); do
            if docker run --rm --network kmsnet curlimages/curl:latest -fsS http://local-kms:8080/_health >/dev/null 2>&1; then
              echo ready; break
            fi
            sleep 1
          done
          docker run --rm --network kmsnet \
            -e KMS_URL=http://local-kms:8080 \
            -e AWS_ACCESS_KEY_ID=test \
            -e AWS_SECRET_ACCESS_KEY=test \
            local-kms-tests pytest -v --tb=short
          docker rm -f local-kms || true
          docker network rm kmsnet || true

      - name: Build & push multi-arch
        if: github.event_name != 'pull_request'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64,linux/arm64
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          build-args: |
            VERSION=${{ steps.bargs.outputs.version }}
            GIT_COMMIT=${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  release:
    name: github-release
    needs: [binaries, docker]
    if: github.ref_type == 'tag'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: artifacts/*.bin
          generate_release_notes: true
